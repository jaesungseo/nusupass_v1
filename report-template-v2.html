/* ════════════════════════════════════════════════════════════════

@font-face{
  font-family:'Pretendard';
  src:url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
}

:root{
  --ink:#1a1a1a;
  --ink-2:#3a3a3a;
  --ink-3:#7a7a7a;
  --line:#1a1a1a;
  --line-soft:#bdbdbd;

  --paper:#ffffff;

}

*{box-sizing:border-box;margin:0;padding:0}

html,body{
  background:var(--bg);
  font-family:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  color:var(--ink);
  font-size:13px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}

/* ─── 페이지 컨테이너 ─── */
.report{
  max-width:210mm;
  margin:0 auto;
  padding:0;
}

.page{
  width:210mm;
  padding:24mm 22mm 20mm 22mm;
  background:var(--paper);
  page-break-after:always;
  break-after:page;
  position:relative;
}
/* 첫 화면(non-print)에서는 페이지 분리감을 위해 최소 높이 유지 */
body:not(.embed) .page{
  min-height:297mm;
}
.page:last-child{
  page-break-after:auto;
  break-after:auto;
}

/* iframe embed 시 페이지 간 시각적 구분 */
body:not(.embed) .page{
  margin:14px auto;

}

}

.cover-addr{

}
.cover-addr-row{

  align-items:flex-start;
}
.cover-addr-label{
  width:80px;

  letter-spacing:1.2em;
  padding-left:8px;
}
.cover-addr-sep{
  width:14px;
  flex-shrink:0;
}
.cover-body{
  margin:60px 0 60px;
  font-size:14px;
  line-height:2.0;

  padding:0 4px;
}
.cover-officer{
  margin-top:60px;
  font-size:14px;
  line-height:2.0;
}
.cover-company{

  font-size:15px;

.cover-company .corp{

}
.cover-company .ceo{

}

/* ─── 섹션 제목 (Page 2~7 공통) ─── */
.sec-title{

}
.sub-title{

/* ─── 표 공통 스타일 ─── */
.t{

}
.t th, .t td{

}
.t th{

  text-align:center;
  font-size:13px;

}
.t td.lbl{
  background:transparent;
  text-align:center;
  font-weight:500;
  width:120px;
  letter-spacing:0.05em;
}
.t td.val{
  text-align:left;
  padding:10px 14px;
}
.t td.val-c{
  text-align:center;
}
.t td.val-r{
  text-align:right;
}

/* 1. 총괄표 / 6. 손해액평가 — 매트릭스 표 */
.summary-matrix th{

}
.summary-matrix td{

}
.summary-matrix td.lbl{

.summary-matrix td.val{

.payment-cell .pc-line{

}
.payment-cell .pc-table{

.payment-cell .pc-table th,
.payment-cell .pc-table td{

  text-align:center;
  vertical-align:middle;
}
.payment-cell .pc-table th{

/* 2. 보험계약사항 — 3컬럼 표 */
.contract-table td.lbl{
  width:90px;
  letter-spacing:0.3em;
  padding-left:0.4em;
  padding-right:0.4em;
}
.contract-table td.val{
  text-align:center;
}
.contract-table td.note{

  text-align:center;

/* 3. 일반사항 — 가/나 표 */
.general-table td.lbl{
  width:120px;
  letter-spacing:0.05em;
}
.general-table td.val{
  white-space:pre-line;
}

/* 4. 사고사항 — 사진 표 */
.accident-table td.lbl{
  width:90px;
  letter-spacing:0.05em;
}
.photo-cell{
  height:120px;
  padding:6px !important;
  text-align:center;
}
.photo-cell-row{

.photo-slot{

.photo-slot img{

.photo-row{
  page-break-inside:avoid;

/* P5 페이지 — 사진이 많으면 자동으로 다음 페이지로 흐름 */
.page[data-page="5"]{
  page-break-after:auto !important;
  break-after:auto !important;

/* v6.1.4: 수기 수정 — contenteditable 셀 시각 표시 */
[contenteditable="true"]{
  outline:none;
  cursor:text;
  transition:background 0.12s ease;
}
[contenteditable="true"]:hover{
  background:rgba(217,90,48,0.04);
}
[contenteditable="true"]:focus{
  background:rgba(217,90,48,0.08);
  outline:1px dashed rgba(217,90,48,0.4);
  outline-offset:-2px;
}
/* 인쇄 시엔 편집 표식 제거 */
@media print{
  [contenteditable="true"]:hover,
  [contenteditable="true"]:focus{
    background:transparent !important;
    outline:none !important;
  }
}
/* embed 모드일 때만 편집 힌트 보임 (단독 뷰는 깨끗하게) */
body:not(.embed) [contenteditable="true"]:hover,
body:not(.embed) [contenteditable="true"]:focus{
  background:transparent;
  outline:none;
}

/* 5. 법률상손해배상책임검토 */
.liability-table td.lbl{
  width:120px;
  letter-spacing:0.1em;
}
.liability-table td.val{
  white-space:pre-line;
  padding:10px 14px;
}
.subsection{
  margin-bottom:18px;
}

/* 7. 첨부자료 */
.attach-table th,
.attach-table td{
  text-align:center;
  padding:8px 6px;
  height:34px;
}
.attach-table th{
  background:var(--gray-head);
  font-weight:700;
}
.attach-table td.no{
  width:80px;
  font-weight:500;
}
.report-end{
  margin-top:60px;
  text-align:center;
  font-size:13px;
  letter-spacing:0.05em;
  line-height:2;
}

/* ─── 인쇄 모드 (전용) ─── */
@page{

  margin:0;

@media print{

    margin:0 !important;

  .page[data-page="5"]{

    break-after:auto !important;

  /* P5 다음에 P6이 페이지 전환되도록 P6 시작 시 강제 분할 */
  .page[data-page="6"]{

  .attach-table th{
    -webkit-print-color-adjust:exact !important;
    print-color-adjust:exact !important;
  }
}
</style>

   ════════════════════════════════════════════════════════════════ */

const params = new URLSearchParams(location.search);
if (params.get('embed') === '1') document.body.classList.add('embed');

      { label:'사고장소',   value:'서울특별시 동대문구 은하수 드림필아파트\n101동 206호', note:'증권주소지와 불일치' },
      { label:'보상한도',   value:'₩100,000,000', note:'' },
      { label:'자기부담금', value:'₩200,000', note:'대물사고시' },
      { label:'특약조건',   value:'가족일상생활배상책임', note:'' },
      { label:'사고일자',   value:'25.03.03', note:'' },

      { label:'연락처',           value:'-' },
      { label:'주민등록등본\n소재지', value:'서울특별시 동대문구 청호대로89길30, 101동 206호\n(장안동,은하수 드림필아파트)' },
      { label:'동거인',           value:'김세연(배우자), 백지훈(부), 이숙자(모), 백동(자녀)' },

const D = CASES[caseId] || CASES['SMPL_01_백석균'];

// 부책/면책에 따라 5번 다/라 표준 멘트 자동 채움 (사용자가 비워뒀을 때만)
function applyStandardMessages() {
  const cov = (D.liability && D.liability.coverDecision) || '';
  const isBubchaek = cov.includes('부책');
  const isMeonchaek = cov.includes('면책');

  // 다. 책임제한/피해자 과실
  if (D.liability && (!D.liability.faultReview || D.liability.faultReview === '-')) {
    D.liability.faultReview = isBubchaek
      ? '금번 사고의 제반정황, 당사 현장조사 등을 종합적으로 검토한 바, 피보험자 세대에서 발생한 누수사고에 대하여 피해세대의 과실을 인정할만한 사유가 없으며, 사전에 예측하고 대비하기는 어려웠을 것으로 여겨지므로 피해자 측의 과실을 묻기는 어려울 것으로 사료됨.'
      : isMeonchaek
        ? '면책 사유에 해당되어 검토하지 않음'
        : D.liability.faultReview || '';
  }

  // 라. 손해방지비용 검토 — 담보여부 자동, 검토사항 표준 멘트

    if (!D.liability.mitigation || D.liability.mitigation === '-') {

function renderPhotoRow(label, photos){
  const p = photos || [];
  if (p.length === 0) {
    // 빈 슬롯 1행 (양식 기본)
    return `
      <tr class="photo-row">
        <td class="lbl-photo">현장사진<br>(${escapeHtml(label)})</td>
        <td class="photo-cell" colspan="2">
          <div class="photo-cell-row">
            <div class="photo-slot"></div>
            <div class="photo-slot"></div>
          </div>
        </td>
      </tr>`;
  }
  // 사진 2장씩 묶어서 행 생성. 첫 행에만 라벨 표시 (rowspan), 나머지 행은 라벨 셀 생략
  const rows = [];
  for (let i = 0; i < p.length; i += 2) {
    const a = p[i] ? `<div class="photo-slot"><img src="${escapeHtml(p[i].url||'')}" alt=""/></div>` : `<div class="photo-slot"></div>`;
    const b = p[i+1] ? `<div class="photo-slot"><img src="${escapeHtml(p[i+1].url||'')}" alt=""/></div>` : `<div class="photo-slot"></div>`;
    rows.push({ a, b });
  }
  const totalRows = rows.length;
  return rows.map((r, idx) => `
    <tr class="photo-row">
      ${idx === 0
        ? `<td class="lbl-photo" rowspan="${totalRows}">현장사진<br>(${escapeHtml(label)})${totalRows > 1 ? `<br><span style="font-size:10px;color:var(--ink-3)">${p.length}장</span>` : ''}</td>`
        : ''}
      <td class="photo-cell" colspan="2">
        <div class="photo-cell-row">
          ${r.a}
          ${r.b}
        </div>
      </td>
    </tr>`).join('');
}

// v6.1.4: 수기 수정 가능한 셀 일괄 마킹
function applyEditableCells(){
  // 본문 텍스트 셀 (라벨 셀 lbl 제외, 헤더 th 제외, 사진/도장 영역 제외)
  const editableSelectors = [
    '.cover-meta > div',                              // 보고서 번호 / 제출일자
    '.cover-addr-row > div:last-child',               // 수신/참조/제목 우측 값
    '.cover-body',                                     // 본문 인사
    '.cover-officer > div',                            // 손해사정사/담당자 4줄
    '.cover-company .corp', '.cover-company .ceo',    // 회사명/대표이사
    '.t td.val',                                       // 일반 표 본문 셀
    '.t td.note',                                      // 비고 셀
    '.t td.dash',                                      // "-" 또는 금액 셀 (총괄표/손해액평가)
    '.payment-cell .pc-table td',                      // 지급처 표 셀
    '.attach-table td:nth-child(2)',                   // 첨부자료 이름 셀
    '.report-end'                                      // 마무리 멘트
  ];

  editableSelectors.forEach(sel => {
    document.querySelectorAll(sel).forEach(el => {
      el.setAttribute('contenteditable', 'true');
      el.setAttribute('spellcheck', 'false');
    });
  });
}

// v6.1.4: 수기 수정 안내 (단독 뷰가 아니라 iframe embed 모드일 때만)
function showEditHint(){
  if (!document.body.classList.contains('embed')) return;
  if (document.getElementById('editHint')) return;
  const hint = document.createElement('div');
  hint.id = 'editHint';
  hint.style.cssText = 'position:sticky;top:0;left:0;right:0;background:#fff3e0;border-bottom:1px solid #f59e0b;padding:8px 16px;font-size:11px;color:#92400e;z-index:100;text-align:center';
  hint.innerHTML = '✎ 본문 영역을 클릭하면 직접 수정할 수 있습니다. 수정 내용은 PDF 출력에 반영됩니다.';
  document.body.insertBefore(hint, document.body.firstChild);
}
showEditHint();

// 운영 사이트에서 iframe.contentWindow.postMessage({ type:'setCase', data:{...} }) 로 데이터 주입
window.addEventListener('message', (e) => {
  if (!e.data) return;
  if (e.data.type === 'setCase') {
    Object.assign(D, e.data.data || {});
    applyStandardMessages();
    renderAll();
  } else if (e.data.type === 'setHeader') {
    const h = e.data.data || {};
    // 표지 영역만 부분 갱신 (전체 재렌더링 없이)
    const recipientEl = document.querySelector('[data-page="1"] .cover-addr-row:nth-child(1) > div:last-child');
    const deptEl = document.querySelector('[data-page="1"] .cover-addr-row:nth-child(2) > div:last-child');
    const titleEl = document.querySelector('[data-page="1"] .cover-addr-row:nth-child(3) > div:last-child');
    if (h.recipient !== undefined && recipientEl) recipientEl.textContent = h.recipient;
    if (h.dept !== undefined && deptEl) deptEl.textContent = h.dept;
    if (h.title !== undefined && titleEl) titleEl.textContent = h.title;
  }
});

renderAll();
</script>
</body>
</html>
